<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cyberpunk AI Assistant</title>
    <link rel="stylesheet" href=
"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="profile-info">
            <div class="profile-pic">
                <!-- <div class="ai-icon">AI</div> -->
                <!-- <div class="status-indicator"></div> -->
            </div>
            <div class="profile-details">
                <strong>NEXUS AI</strong>
                <!-- <p class="status-text">
                    <span class="pulse-dot"></span>
                    Neural Network Active
                </p> -->
            </div>
        </div>
        <div class="header-actions">
            <i class="fa fa-cog" aria-hidden="true"></i>
            <span class="action-btn">⋮</span>
        </div>
    </div>

    <div id="message-list">
        <div class="message ai-message">
            <div class="message-content">
                <span class="typing-indicator">◉</span> How can I assist you today?
            </div>
        </div>
    </div>

    <div class="input-area">
        <label for="file-upload" class="attach-btn">
            <!-- <span class="attach-icon">📎</span> -->
             <i class="fa fa-paperclip" aria-hidden="true"></i>
            <input type="file" id="file-upload" hidden>
        </label>
        <div class="input-wrapper">
            <input type="text" id="chat-input" placeholder="Enter your query...">
            <div class="input-glow"></div>
        </div>
        <button id="send-btn">
            <!-- <span class="send-text">SEND</span> -->
            <span class="send-icon">➤</span>
        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
