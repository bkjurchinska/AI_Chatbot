<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>AI Chatbot UI</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; background: #f4f4f9; }
        .chat-container { width: 400px; height: 500px; background: white; border: 1px solid #ddd; display: flex; flex-direction: column; margin-top: 50px; border-radius: 8px; overflow: hidden; }
        #message-list { flex: 1; padding: 20px; overflow-y: auto; border-bottom: 1px solid #ddd; }
        .input-area { padding: 10px; display: flex; gap: 5px; }
        #chat-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        #send-btn { padding: 10px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .message { margin-bottom: 10px; padding: 8px; border-radius: 4px; background: #e9ecef; width: fit-content; }
    </style>
</head>
<body>

<div class="chat-container">
    <div id="message-list">
        <div class="message">Hello! How can I help you today?</div>
    </div>
    <div class="input-area">
        <input type="text" id="chat-input" placeholder="Type a message...">
        <button id="send-btn">Send</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
